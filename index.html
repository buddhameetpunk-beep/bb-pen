
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B&B</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    img,
    button {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .home {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #ffffff;

      --pen-rest-rotation: 90deg;
      --pen-selected-rotation: 18deg;

      --about-rotate: 0deg;
      --about-shift-x: -44px;
      --about-shift-y: 0px;
    }

    .home.guide-complete {
      --pen-rest-rotation: 0deg;
    }

    .home.pen-mode {
      cursor: none;
    }

    .home.pen-mode .logo-wrap,
.home.pen-mode .hand-wrap,
.home.pen-mode .about-ui,
.home.pen-mode .about-panel,
.home.pen-mode .khepri-ui,
.home.pen-mode .language-switch {
  pointer-events: none !important;
}


html.pen-mode-active,
html.pen-mode-active *,
body.pen-mode-active,
body.pen-mode-active * {
  cursor: none !important;
}

    #drawCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9998;
      pointer-events: none;
    }

    .logo-wrap {
      position: fixed;
      top: 2.4vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 36;
      cursor: pointer;
      pointer-events: auto;
    }

    .logo {
      display: block;
      width: clamp(180px, 22vw, 360px);
      height: auto;
    }

    .hand-wrap {
      position: fixed;
      left: -1.8vw;
      bottom: 0;
      width: min(72vh, 690px);
      height: 100vh;
      z-index: 2;
      pointer-events: none;
    }

    .home.guide-complete.hand-click-ready .hand-wrap {
      pointer-events: auto;
      cursor: pointer;
    }

    .hand-inner {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      transform: translateY(108%);
      opacity: 0;
      transition:
        transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.25s ease;
      will-change: transform, opacity;
    }

    .home.guide-complete .hand-inner {
      transform: translateY(0%);
      opacity: 1;
      transition-delay: 0.12s;
    }

    .hand-frame {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: left bottom;
      pointer-events: none;
      opacity: 1;
      transition: none;
      transform: translateY(5.2vh) scale(1.06);
      transform-origin: left bottom;
    }

    .guide {
      position: fixed;
      left: 4.2vw;
      top: 18vh;
      z-index: 3;
      pointer-events: none;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #000000;
    }

    .home.lang-jp .guide {
      font-family: "Tsukushi Gothic", "筑紫ゴシック", "Yu Gothic", "YuGothic", sans-serif;
    }

    .home.lang-cn .guide {
      font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .home.lang-ar .guide {
      left: auto;
      right: 4.2vw;
      direction: rtl;
      text-align: right;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    .guide-step {
      margin: 0 0 10px 0;
      font-size: clamp(34px, 5.8vw, 86px);
      line-height: 0.9;
      letter-spacing: -0.07em;
      color: #000000;
      transition:
        opacity 0.25s ease,
        color 0.25s ease,
        transform 0.25s ease;
    }

    .home.lang-jp .guide-step,
    .home.lang-cn .guide-step {
      font-size: clamp(28px, 4.8vw, 72px);
      letter-spacing: -0.045em;
      line-height: 1.04;
    }

    .home.lang-ar .guide-step {
      letter-spacing: 0;
      line-height: 1.05;
    }

    .guide-step.is-disabled {
      color: #c8c8c8;
    }

    .guide-step.is-completed {
      opacity: 0;
      transform: translateY(-10px);
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    .about-ui {
      position: fixed;
      top: 1.6vh;
      right: 0.8vw;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-125%);
      transition:
        transform 0.78s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.2s ease;
      transition-delay: 0s;
    }

    .home.guide-complete .about-ui {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      transition-delay: 0.18s;
    }

    .about-button {
      border: none;
      background: transparent;
      color: #000000;
      padding: 0;
      line-height: 1;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      display: block;
    }

    .about-art {
      position: relative;
      display: block;
      width: clamp(760px, 58vw, 1180px);
      aspect-ratio: 1115 / 413;
      transform:
        translate(var(--about-shift-x), var(--about-shift-y))
        rotate(var(--about-rotate));
      transform-origin: 62% 52%;
      transition: transform 0.16s linear;
    }

    .about-art-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: right top;
      pointer-events: none;
    }

    .about-art-normal {
      display: block;
    }

    .about-art-hover,
    .about-art-vertical {
      display: none;
    }

    .about-button:hover .about-art-normal,
    .about-button.is-active .about-art-normal {
      display: none;
    }

    .about-button:hover .about-art-hover,
    .about-button.is-active .about-art-hover {
      display: block;
    }

    .home.about-vertical .about-art-normal {
      display: block;
    }

    .home.about-vertical .about-art-hover,
    .home.about-vertical .about-art-vertical {
      display: none;
    }

    .home.about-vertical .about-button:hover .about-art-normal,
    .home.about-vertical .about-button.is-active .about-art-normal {
      display: none;
    }

    .home.about-vertical .about-button:hover .about-art-vertical,
    .home.about-vertical .about-button.is-active .about-art-vertical {
      display: block;
    }

    .about-text {
      display: none;
    }

    .question-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }

    .question-img-normal {
      display: block;
    }

    .question-img-hover {
      display: none;
    }

    .about-button:hover .question-img-normal,
    .about-button.is-active .question-img-normal {
      display: none;
    }

    .about-button:hover .question-img-hover,
    .about-button.is-active .question-img-hover {
      display: block;
    }

    .about-panel {
      position: fixed;
      top: 34vh;
      right: 2.4vw;
      width: min(44vw, 620px);
      max-height: 60vh;
      overflow: auto;
      z-index: 34;
      background: transparent;
      border: none;
      color: #000000;
      transform: translateY(-130%);
      opacity: 0;
      pointer-events: none;
      transition:
        transform 0.58s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.18s ease;
    }

    .home.about-open .about-panel {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .about-content {
      padding: 0 0 34px;
      font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      text-align: right;
    }

    .about-title {
      display: none;
      margin: 0 0 26px 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(42px, 10vw, 86px);
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 400;
      text-align: right;
    }

    .home.lang-jp .about-content {
      font-family: "Tsukushi Gothic", "筑紫ゴシック", "Yu Gothic", "YuGothic", sans-serif;
      text-align: right;
    }

    .home.lang-cn .about-content {
      text-align: right;
    }

    .home.lang-ar .about-content {
      direction: rtl;
      text-align: right;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    .about-content p {
      margin: 0 0 18px 0;
      font-size: clamp(17px, 1.45vw, 23px);
      line-height: 1.42;
      font-weight: 400;
      letter-spacing: -0.035em;
    }

    .home.lang-jp .about-content p,
    .home.lang-cn .about-content p {
      letter-spacing: -0.025em;
      line-height: 1.48;
    }

    .home.lang-ar .about-content p {
      letter-spacing: 0;
      line-height: 1.55;
    }

    .mobile-shop {
      display: none;
    }

    .about-close {
      display: none;
      position: fixed;
      top: 31vh;
      right: 2.4vw;
      z-index: 41;
      border: none;
      background: transparent;
      color: #000000;
      font-size: 46px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      appearance: none;
      -webkit-appearance: none;
      transition: color 0.18s ease;
    }

    .about-close:hover {
      color: #42bdff;
    }

.khepri-ui {
  position: fixed;
  right: 2.2vw;
  bottom: 12vh;
  width: clamp(230px, 18vw, 380px);
  z-index: 38;
  pointer-events: none;
  opacity: 0;
  transform: translateX(140%);
  transition:
    transform 0.78s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.22s ease;
}

    .home.guide-complete .khepri-ui {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
      transition-delay: 0.28s;
    }

    .home.about-open .khepri-ui {
      opacity: 0;
      transform: translateX(150%);
      pointer-events: none;
      transition-delay: 0s;
    }

    .khepri-button {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .khepri-img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .khepri-img-hover,
    .khepri-img-copied {
      display: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .khepri-button:hover .khepri-img-normal {
        display: none;
      }

      .khepri-button:hover .khepri-img-hover {
        display: block;
      }
    }

    .khepri-button.is-stage-two .khepri-img-normal,
    .khepri-button.is-stage-two .khepri-img-copied {
      display: none !important;
    }

    .khepri-button.is-stage-two .khepri-img-hover {
      display: block !important;
    }

    .khepri-button.is-copied .khepri-img-normal,
    .khepri-button.is-copied .khepri-img-hover {
      display: none !important;
    }

    .khepri-button.is-copied .khepri-img-copied {
      display: block !important;
    }

    .khepri-button.force-normal .khepri-img-normal {
      display: block !important;
    }

    .khepri-button.force-normal .khepri-img-hover,
    .khepri-button.force-normal .khepri-img-copied {
      display: none !important;
    }

    .language-switch {
      position: fixed;
      right: 2.2vw;
      bottom: 2.2vh;
      z-index: 30;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
    }

    .language-toggle {
      display: none;
      position: relative;
      width: 56px;
      height: 56px;
      border: none;
      background: transparent;
      color: #000000;
      padding: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .lan-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }

    .lan-img-normal {
      display: block;
    }

    .lan-img-hover {
      display: none;
    }

    .language-toggle:hover .lan-img-normal,
    .language-switch.is-open .lan-img-normal {
      display: none;
    }

    .language-toggle:hover .lan-img-hover,
    .language-switch.is-open .lan-img-hover {
      display: block;
    }

    .language-options {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .language-button {
      position: relative;
      display: block;
      width: clamp(54px, 4.6vw, 82px);
      aspect-ratio: 1 / 1;
      border: none;
      background: transparent;
      color: #000000;
      padding: 0;
      line-height: 1;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .lang-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
    }

    .lang-img-normal {
      display: block;
    }

    .lang-img-hover {
      display: none;
    }

    .language-button:hover .lang-img-normal,
    .language-button.is-active .lang-img-normal {
      display: none;
    }

    .language-button:hover .lang-img-hover,
    .language-button.is-active .lang-img-hover {
      display: block;
    }

    .pen-wrap {
      position: fixed;
      left: 50vw;
      top: 74vh;
      height: 120vh;
      z-index: 9999;
      transform: translate(-50%, -50%) rotate(var(--pen-rest-rotation));
      transform-origin: 50% 50%;
      transition:
        transform 0.18s ease,
        left 0.18s ease,
        top 0.18s ease,
        height 0.18s ease;
      will-change: left, top, transform;
      pointer-events: auto;
    }

    .home.guide-complete .pen-wrap {
      left: 50vw;
      top: 56vh;
      height: 82vh;
    }

    .pen-wrap.is-selected {
      z-index: 99999;
      transform: translate(-50%, -50%) rotate(var(--pen-selected-rotation));
      transition: none;
      pointer-events: none;
    }

    .home.pen-mode .pen-wrap {
      z-index: 99999;
    }

    .pen {
      display: block;
      height: 100%;
      width: auto;
      pointer-events: none;
    }

    .press-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 22%;
      cursor: pointer !important;
      z-index: 4;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      display: block;
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
    }

    .body-area {
      position: absolute;
      top: 18%;
      left: 0;
      width: 100%;
      height: 82%;
      cursor: pointer !important;
      z-index: 3;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      display: block;
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
    }

    .press-area:focus,
    .body-area:focus,
    .language-button:focus,
    .language-toggle:focus,
    .about-button:focus,
    .about-close:focus,
    .khepri-button:focus {
      outline: none;
    }

    @media (max-width: 1100px) and (min-width: 701px) {
      .hand-wrap {
        width: min(66vh, 630px);
        height: 96vh;
        left: -2vw;
      }

      .hand-frame {
        transform: translateY(5.6vh) scale(1.06);
      }

      .about-art {
        width: clamp(560px, 54vw, 820px);
      }

      .about-panel {
        top: 37vh;
        max-height: 55vh;
      }

      .khepri-ui {
        width: clamp(150px, 14vw, 240px);
        bottom: 24vh;
      }

      .language-button {
        width: clamp(50px, 5.2vw, 72px);
      }

      .home:not(.guide-complete) .pen-wrap {
        height: min(98vh, 86vw);
        top: 75vh;
      }

      .home.guide-complete .pen-wrap {
        height: 78vh;
      }
    }

    @media (max-width: 820px) {
      .language-switch {
        right: 3.2vw;
        bottom: 3.2vw;
        display: block;
      }

      .home.about-open .language-switch {
        z-index: 46;
      }

      .language-toggle {
        display: block;
      }

      .language-options {
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition:
          opacity 0.2s ease,
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .language-switch.is-open .language-options {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .language-button {
        width: 54px;
        height: 54px;
      }

      .about-art {
        display: none;
      }

      .about-text {
        position: relative;
        display: block;
        width: 56px;
        height: 56px;
      }

      .about-button {
        border: none;
        background: transparent;
        padding: 0;
      }
    }

    @media (max-width: 700px) {
      .home {
        --pen-rest-rotation: 0deg;
        --pen-selected-rotation: 18deg;
        --about-rotate: 0deg !important;
        --about-shift-x: 0px !important;
        --about-shift-y: 0px !important;
      }

      .logo-wrap {
        top: 3vw;
        z-index: 10040;
      }

      #drawCanvas {
        z-index: 199998;
      }

      .pen-wrap,
      .pen-wrap.is-selected,
      .home.pen-mode .pen-wrap {
        z-index: 199999;
      }

      .about-ui {
        z-index: 10050;
      }

      .about-panel {
        z-index: 10030;
      }

      .language-switch,
      .home.about-open .language-switch {
        z-index: 10060;
      }

      .about-close {
        z-index: 10070;
      }

      .logo {
        width: 94vw;
      }

      /* Mobile ABOUT opens like a new sheet from the top.
         Hide the fixed logo and question icon while the sheet is open,
         then start the title near the top with a safe margin. */
      .home.about-open .logo-wrap,
      .home.about-open .about-ui {
        opacity: 0;
        pointer-events: none;
      }

      .home.about-open .about-content {
        padding-top: max(34px, calc(env(safe-area-inset-top) + 28px));
      }

      .hand-wrap {
        display: none;
      }

      .guide {
        left: 4.5vw;
        top: 38vw;
      }

      .home.lang-ar .guide {
        left: auto;
        right: 4.5vw;
      }

      .guide-step {
        font-size: clamp(24px, 7.4vw, 46px);
        margin-bottom: 7px;
      }

      .home.lang-jp .guide-step,
      .home.lang-cn .guide-step {
        font-size: clamp(21px, 6.5vw, 38px);
        line-height: 1.08;
      }

      .pen-wrap,
      .home.guide-complete .pen-wrap {
        left: 50vw;
        height: 74dvh;
        top: 54dvh;
      }

      /* iOS Safari puts the browser bar at the bottom, so the same center looks visually too high.
         Only Safari gets a small downward correction; Chrome iOS keeps the original layout. */
      .home.mobile-safari .pen-wrap,
      .home.mobile-safari.guide-complete .pen-wrap {
        top: 60dvh;
      }

      .about-ui {
        top: auto;
        right: auto;
        left: 4vw;
        bottom: 3.2vw;
        transform: translateY(0);
      }

      .home.guide-complete .about-ui {
        transform: translateY(0);
      }

      .about-panel {
        top: 0;
        left: 0;
        right: auto;
        width: 100vw;
        height: 100dvh;
        max-height: none;
        z-index: 10030;
        background: #ffffff;
        transform: translateY(-105%);
        opacity: 0;
      }

      .home.about-open .about-panel {
        transform: translateY(0);
        opacity: 1;
      }

      .about-content {
        padding: max(34px, calc(env(safe-area-inset-top) + 28px)) 22px 118px;
        text-align: left;
      }

      .about-title {
        display: block;
        text-align: left;
        border-bottom: 2px solid #000000;
        padding-bottom: 14px;
        margin: 0 56px 24px 0;

        font-size: clamp(34px, 11.5vw, 60px);
        line-height: 0.9;
        letter-spacing: -0.065em;
        font-weight: 400;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .home.lang-jp .about-content,
      .home.lang-cn .about-content {
        text-align: left;
      }

      .home.lang-ar .about-content {
        direction: rtl;
        text-align: right;
      }

      .home.lang-ar .about-title {
        text-align: right;
        margin: 0 0 24px 56px;
      }

      .about-content p {
        font-size: clamp(18px, 5vw, 24px);
        line-height: 1.46;
        letter-spacing: -0.04em;
        margin-bottom: 18px;
      }

      .home.lang-jp .about-content p,
      .home.lang-cn .about-content p {
        line-height: 1.5;
      }

      .home.lang-ar .about-content p {
        line-height: 1.62;
      }

      .mobile-shop {
        display: block;
        margin-top: 46px;
      }

    .mobile-shop-title {
  margin: 0 0 18px 0;
  font-size: clamp(34px, 11.5vw, 60px);
  line-height: 0.9;
  letter-spacing: -0.065em;
  font-weight: 400;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

      .mobile-shop-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        border-top: 2px solid #000000;

      const numberText = String(frameNumber).padStart(2, "0");
      const nextSrc = `hand${numberText}.png`;

      handImage.src = nextSrc;
    }

    function getCurrentHandFrame() {
      const match = currentHandSrc.match(/hand(0[1-9]|10)\.png/);
      return match ? Number(match[1]) : 1;
    }

    function clearHandAnimation() {
      handAnimationTimers.forEach((timer) => clearTimeout(timer));
      handAnimationTimers = [];
      isHandAnimating = false;
    }

    function playHandSequence(sequence, onComplete) {
      clearHandAnimation();

      isHandAnimating = true;
      manualHandMode = true;

      sequence.forEach((frame, index) => {
        const timer = setTimeout(() => {
          setHandFrame(frame);

          if (index === sequence.length - 1) {
            isHandAnimating = false;

            if (typeof onComplete === "function") {
              onComplete();
            }
          }
        }, index * 38);

        handAnimationTimers.push(timer);
      });
    }

    function playHandTo10() {
      const currentFrame = getCurrentHandFrame();
      const start = Math.min(Math.max(currentFrame + 1, 2), 10);
      const sequence = [];

      for (let frame = start; frame <= 10; frame++) {
        sequence.push(frame);
      }

      if (sequence.length === 0) {
        sequence.push(10);
      }

      playHandSequence(sequence, () => {
        handExpanded = true;
        manualHandMode = true;
      });
    }

    function playHandBackTo01() {
      const currentFrame = getCurrentHandFrame();
      const start = Math.max(Math.min(currentFrame - 1, 9), 1);
      const sequence = [];

      for (let frame = start; frame >= 1; frame--) {
        sequence.push(frame);
      }

      if (sequence.length === 0) {
        sequence.push(1);

        try {

      khepriButton.classList.remove("force-normal");

      /*
        手机端 / 手机横屏 / 被压扁状态：
        第一次点：01 → 02
        第二次点：02 → 03，并复制地址
        03 停留 3 秒后自动回到 01
        回到 01 后可以重复同样操作
      */
      if (isMobileKhepriMode()) {
        if (khepriMobileStage === 0) {
          khepriMobileStage = 1;

          khepriButton.classList.remove("is-copied", "force-normal");
          khepriButton.classList.add("is-stage-two");

          return;
        }

        if (khepriMobileStage === 1) {
          khepriMobileStage = 2;

          khepriButton.classList.remove("is-stage-two", "force-normal");
          khepriButton.classList.add("is-copied");

          await copyAddresses();

          khepriCopiedTimer = setTimeout(() => {
            khepriMobileStage = 0;
            khepriButton.classList.remove("is-copied", "is-stage-two");
            khepriButton.classList.add("force-normal");
          }, 3000);

          return;
        }

        return;
      }

      /*
        宽屏桌面状态：
        点击直接显示 khepri03.png，复制地址，3 秒后回到 khepri01.png。
      */
      khepriMobileStage = 0;

      khepriButton.classList.remove("is-stage-two", "force-normal");
      khepriButton.classList.add("is-copied");

      await copyAddresses();

      khepriCopiedTimer = setTimeout(() => {
        khepriButton.classList.remove("is-copied", "is-stage-two");
        khepriButton.classList.add("force-normal");
      }, 3000);
    });


    handWrap.addEventListener("pointerdown", (event) => {
      if (!home.classList.contains("guide-complete")) return;
      if (!home.classList.contains("hand-click-ready")) return;

      event.preventDefault();
      event.stopPropagation();
    });

    handWrap.addEventListener("dblclick", (event) => {
      event.preventDefault();
      event.stopPropagation();
    });

    handWrap.addEventListener("click", (event) => {
        if (isSelected) {
  event.preventDefault();
  event.stopPropagation();
  return;
}
      if (!home.classList.contains("guide-complete")) return;
      if (!home.classList.contains("hand-click-ready")) return;
      if (isHandAnimating) return;

      event.preventDefault();
      event.stopPropagation();

      const now = Date.now();

      if (now - lastHandClickTime < 180) {
        return;
      }

      lastHandClickTime = now;

      if (handExpanded || getCurrentHandFrame() >= 10) {
        playHandBackTo01();
      } else {
        playHandTo10();
      }
    });

    function clampNumber(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function isFlatLayout() {
      return window.matchMedia("(max-height: 620px) and (min-width: 701px)").matches;
    }

    function isMobileKhepriMode() {
      return (
        window.matchMedia("(hover: none) and (pointer: coarse)").matches ||
        window.matchMedia("(max-height: 620px) and (min-width: 701px)").matches ||
        window.matchMedia("(max-width: 900px) and (max-height: 700px)").matches
      );
    }

    function getSelectedPenAngle() {
      const baseAngle = isFlatLayout() ? 90 : 0;
      const selectedAngle = baseAngle + 18;
      return selectedAngle * Math.PI / 180;
    }

    function updateGuide() {
      guideStep1.classList.toggle("is-completed", step1Done);
      guideStep2.classList.toggle("is-completed", step2Done);
      guideStep3.classList.toggle("is-completed", step3Done);

      guideStep2.classList.toggle("is-disabled", !step1Done);
      guideStep3.classList.toggle("is-disabled", !step2Done);

      const guideComplete = step1Done && step2Done && step3Done;
      home.classList.toggle("guide-complete", guideComplete);

      if (!guideComplete) {
        closeAbout();
      }
    }

    function updateHandFrameByWidth() {
      const w = window.innerWidth;
      const clickReady = w > 700 && !isFlatLayout();

      home.classList.toggle("hand-click-ready", clickReady);

      if (isHandAnimating) {
        return;
      }

      const progress = clampNumber(
        (HAND_MAX_WIDTH - w) / (HAND_MAX_WIDTH - HAND_MIN_WIDTH),
        0,
        1
      );

      let nextFrame = 1;

      /*
        通常状态：窗口从宽到窄时，hand01 → hand05。
        点击手之后：hand10 成为新的最宽状态，窗口从宽到窄时，hand10 → hand05。
      */
      if (clickReady && handExpanded) {
        manualHandMode = true;

        if (progress < 0.36) {
          nextFrame = 10;
        } else if (progress < 0.50) {
          nextFrame = 9;
        } else if (progress < 0.64) {
          nextFrame = 8;
        } else if (progress < 0.78) {
          nextFrame = 7;
        } else if (progress < 0.90) {
          nextFrame = 6;
        } else {
          nextFrame = 5;
        }
      } else {
        if (clickReady && manualHandMode) {
          return;
        }

        manualHandMode = false;
        handExpanded = false;

        if (progress < 0.45) {
          nextFrame = 1;
        } else if (progress < 0.60) {
          nextFrame = 2;
        } else if (progress < 0.75) {
          nextFrame = 3;
        } else if (progress < 0.90) {
          nextFrame = 4;
        } else {
          nextFrame = 5;
        }
      }

      const nextSrc = `hand${String(nextFrame).padStart(2, "0")}.png`;

      if (nextSrc !== currentHandSrc) {
        setHandFrame(nextFrame);
      }
    }

    function updateAboutRotationByWidth() {
      const w = window.innerWidth;

      const progress = clampNumber(
        (ABOUT_ROTATE_START - w) / (ABOUT_ROTATE_START - ABOUT_ROTATE_END),
        0,
        1
      );

      const rotation = -90 * progress;
      const shiftX = -44 - 120 * progress;
      const shiftY = 70 * progress;

      home.style.setProperty("--about-rotate", rotation + "deg");
      home.style.setProperty("--about-shift-x", shiftX + "px");
      home.style.setProperty("--about-shift-y", shiftY + "px");

      home.classList.toggle(
        "about-vertical",
        progress > ABOUT_VERTICAL_THRESHOLD && w > 700
      );
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;

      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      updateHandFrameByWidth();
      updateAboutRotationByWidth();

      if (window.innerWidth > 820) {
        languageSwitch.classList.remove("is-open");
      }

      if (isSelected) {
        movePenTipTo(lastMouseX, lastMouseY);
      }
    }

    resizeCanvas();
    updateGuide();
    setLanguage("en");

    window.addEventListener("resize", resizeCanvas);

    function clearCanvas() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    function stopLivingStroke() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    function pickUpPen(mouseX, mouseY, shouldIgnoreNextPointerUp = true) {
      isSelected = true;
      ignoreNextPointerUp = shouldIgnoreNextPointerUp;
      lastPenPickupTime = performance.now();
      ignoreUpUntil = lastPenPickupTime + 520;
      isDrawing = false;
      hasMoved = false;
      lastPoint = null;
      currentStroke = [];

      lastMouseX = mouseX;
      lastMouseY = mouseY;

      stopLivingStroke();
      clearCanvas();

      home.classList.add("pen-mode");
      document.documentElement.classList.add("pen-mode-active");
      document.body.classList.add("pen-mode-active");
      penWrap.classList.add("is-selected");

      /* 拿起笔后通常收起可能打开的 UI；但手机端 about 打开时，保留文本，让用户可以在上面乱涂乱画 */
      const keepMobileAboutOpen = window.innerWidth <= 700 && home.classList.contains("about-open");

      if (!keepMobileAboutOpen) {
        closeAbout();
      }

      languageSwitch.classList.remove("is-open");

      /* 笔被拿起的瞬间，笔尖立刻取代鼠标位置 */
      movePenTipTo(mouseX, mouseY);
    }

    function putDownPen() {
      isSelected = false;
      ignoreNextPointerUp = false;
      ignoreUpUntil = 0;
      isDrawing = false;
      hasMoved = false;
      lastPoint = null;
      currentStroke = [];

      home.classList.remove("pen-mode");
      document.documentElement.classList.remove("pen-mode-active");
      document.body.classList.remove("pen-mode-active");
      penWrap.classList.remove("is-selected");

      penWrap.style.left = "";
      penWrap.style.top = "";
    }

    function movePenTipTo(mouseX, mouseY) {
      lastMouseX = mouseX;
      lastMouseY = mouseY;

      const penHeight = penWrap.offsetHeight;
      const tipOffsetX = 0;
      const tipOffsetY = penHeight * tipOffsetRatio;
      const angle = getSelectedPenAngle();

      const rotatedX =
        tipOffsetX * Math.cos(angle) - tipOffsetY * Math.sin(angle);

      const rotatedY =
        tipOffsetX * Math.sin(angle) + tipOffsetY * Math.cos(angle);

      const centerX = mouseX - rotatedX;
      const centerY = mouseY - rotatedY;

      penWrap.style.left = centerX + "px";
      penWrap.style.top = centerY + "px";
    }

    function drawLine(from, to) {
      ctx.beginPath();
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000000";
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
    }

    function simplifyStroke(points, step = 2) {
      const out = [];

      for (let i = 0; i < points.length; i += step) {
        out.push(points[i]);
      }

      if (points.length > 1 && out[out.length - 1] !== points[points.length - 1]) {
        out.push(points[points.length - 1]);
      }

      return out;
    }

    function getNormal(points, index) {
      const prev = points[Math.max(0, index - 1)];
      const next = points[Math.min(points.length - 1, index + 1)];

      let dx = next.x - prev.x;
      let dy = next.y - prev.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;

      dx /= len;
      dy /= len;

      return {
        x: -dy,
        y: dx
      };
    }

    function pickRandomAnimationType() {
      const r = Math.random();

      if (r < 0.45) return "wriggle";
      if (r < 0.8) return "pulse";
      return "flow";
    }

    function startLivingStroke(points) {
      stopLivingStroke();

      livingStroke = simplifyStroke(points, 2);

      if (livingStroke.length < 2) return;

      currentAnimationType = pickRandomAnimationType();
      animationId = requestAnimationFrame(animateStroke);
    }

    function animateStroke(time) {
      clearCanvas();

      if (currentAnimationType === "wriggle") {
        drawWriggleStroke(time);
      } else if (currentAnimationType === "pulse") {
        drawPulseStroke(time);
      } else if (currentAnimationType === "flow") {
        drawFlowStroke(time);
      }

      animationId = requestAnimationFrame(animateStroke);
    }

    function drawWriggleStroke(time) {
      ctx.beginPath();
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000000";

      for (let i = 0; i < livingStroke.length; i++) {
        const p = livingStroke[i];

        const waveX =
          Math.sin(time * 0.004 + i * 0.32) * 3.2 +
          Math.cos(time * 0.0022 + i * 0.11) * 1.4;

        const waveY =
          Math.cos(time * 0.0036 + i * 0.28) * 3.2 +
          Math.sin(time * 0.0028 + i * 0.16) * 1.4;

        const x = p.x + waveX;
        const y = p.y + waveY;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();
    }

    function drawPulseStroke(time) {
      const count = livingStroke.length;
      const centerIndex = ((time * 0.012) % (count + 36)) - 18;
      const sigma = Math.max(5, count * 0.08);

      const transformed = [];

      for (let i = 0; i < count; i++) {
        const p = livingStroke[i];
        const normal = getNormal(livingStroke, i);

        const dist = i - centerIndex;
        const bulge = Math.exp(-(dist * dist) / (2 * sigma * sigma));
        const offset = bulge * 14;

        transformed.push({
          x: p.x + normal.x * offset,
          y: p.y + normal.y * offset,
          weight: bulge
        });
      }

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000000";

      for (let i = 1; i < transformed.length; i++) {
        const a = transformed[i - 1];
        const b = transformed[i];

        const w = 2.4 + ((a.weight + b.weight) * 0.5) * 10;

        ctx.beginPath();
        ctx.lineWidth = w;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function drawFlowStroke(time) {
      const count = livingStroke.length;
      const centerIndex = ((time * 0.014) % (count + 44)) - 22;
      const sigma = Math.max(6, count * 0.1);

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#000000";

      for (let i = 1; i < count; i++) {
        const a = livingStroke[i - 1];
        const b = livingStroke[i];

        const midIndex = i - 0.5;
        const dist = midIndex - centerIndex;
        const focus = Math.exp(-(dist * dist) / (2 * sigma * sigma));

        const lineWidth = 1.5 + focus * 11;

        ctx.beginPath();
        ctx.lineWidth = lineWidth;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    pressButton.addEventListener("pointerdown", (event) => {
      event.stopPropagation();
    });

    pressButton.addEventListener("mousedown", (event) => {
      event.stopPropagation();
    });

    pressButton.addEventListener("click", (event) => {
      event.stopPropagation();

      isPressed = !isPressed;
      penImage.src = isPressed ? home02 : home01;

      if (!step1Done) {
        step1Done = true;
        updateGuide();
      }
    });

    function handleBodyPickUp(event) {
      if (event.cancelable) {
        event.preventDefault();
      }
      event.stopPropagation();

      if (isSelected) return;

      if (event.pointerId !== undefined && event.currentTarget && event.currentTarget.releasePointerCapture) {
        requestAnimationFrame(() => {
          try {
            event.currentTarget.releasePointerCapture(event.pointerId);
          } catch (error) {}
        });
      }

      pickUpPen(event.clientX, event.clientY, true);

      if (!step2Done && step1Done) {
        step2Done = true;
        updateGuide();
      }
    }

    bodyButton.addEventListener("pointerdown", handleBodyPickUp);

    /*
      Chrome 会在 pointerdown 后额外触发 mousedown / click。
      这些只负责拦截，不能再次改变笔的状态，否则笔会突然不像鼠标。
    */
    bodyButton.addEventListener("mousedown", (event) => {
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    });

    bodyButton.addEventListener("click", (event) => {
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    });

    function beginDrawPointer(event) {
      if (!isSelected) {
        if (!languageSwitch.contains(event.target)) {
          languageSwitch.classList.remove("is-open");
        }
        return;
      }

      if (event.cancelable) {
        event.preventDefault();
      }

      pointerDownX = event.clientX;
      pointerDownY = event.clientY;
      hasMoved = false;

      movePenTipTo(event.clientX, event.clientY);

      if (!isPressed) {
        isDrawing = false;
        lastPoint = null;
        currentStroke = [];
        return;
      }

      isDrawing = true;

      lastPoint = {
        x: event.clientX,
        y: event.clientY
      };

      currentStroke = [lastPoint];
    }

    function handlePointerMove(event) {
      if (!isSelected) return;

      lastMouseX = event.clientX;
      lastMouseY = event.clientY;

      /* 核心：笔被拿起之后，鼠标到哪里，笔尖就到哪里。 */
      movePenTipTo(event.clientX, event.clientY);

      const distanceX = event.clientX - pointerDownX;
      const distanceY = event.clientY - pointerDownY;
      const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

      if (distance > moveThreshold) {
        hasMoved = true;
      }

      if (isDrawing && isPressed) {
        const currentPoint = {
          x: event.clientX,
          y: event.clientY
        };

        if (lastPoint) {
          drawLine(lastPoint, currentPoint);
        }

        currentStroke.push(currentPoint);
        lastPoint = currentPoint;
      }
    }

    function finishDrawPointer(event) {
      if (!isSelected) return;

      const now = performance.now();

      /* 拿起笔那一下的 mouseup / pointerup 只说明用户松开了笔身，不应该把笔放回去。 */
      if (ignoreNextPointerUp || now <= ignoreUpUntil || now - lastPenPickupTime < 520) {
        ignoreNextPointerUp = false;
        hasMoved = false;
        return;
      }

      if (!hasMoved) {
        putDownPen();
        return;
      }

      if (isDrawing && isPressed && currentStroke.length > 2) {
        const strokeToAnimate = currentStroke.slice();

        if (!step3Done && step2Done) {
          step3Done = true;
          updateGuide();
        }

        putDownPen();

        setTimeout(() => {
          startLivingStroke(strokeToAnimate);
        }, 160);

        return;
      }

      putDownPen();
    }

    if (supportsPointerEvents) {
      window.addEventListener("pointerdown", beginDrawPointer, true);
      document.addEventListener("pointermove", handlePointerMove, true);
      window.addEventListener("pointerup", finishDrawPointer, true);
    } else {
      window.addEventListener("mousedown", beginDrawPointer, true);
      document.addEventListener("mousemove", handlePointerMove, true);
      window.addEventListener("mouseup", finishDrawPointer, true);
    }

    window.addEventListener("pointercancel", () => {
      putDownPen();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        resetGuideToStart();
      }
    });
  </script>
</body>
