    .hand-inner {

      left: 0;
      bottom: 0;

    .guide {

      left: 4.2vw;

      z-index: 3;
      pointer-events: none;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #000000;
    }

    /* Entry is intentionally language-free: the first drawn stroke unlocks it. */
    .guide,
    .guide-en-steps,
    .guide-cn-steps {
      display: none !important;
    }

    /* EN handwriting guide: desktop uses EN1/2/3.png, phone uses EN1/2/3_phone.png.
       Completed steps disappear; future steps stay light gray. */
    .guide-en-steps {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      display: none;
      --en-guide-base-y: 3.4vh;
    }

    /* The four languages now share the live type guide below. */
    .home.lang-en:not(.guide-complete) .guide-en-steps {
      display: none;
    }

    .guide-en-step-img {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      object-position: center center;
      pointer-events: none;
      opacity: 1;
      transform: translateY(calc(var(--en-guide-base-y, 0vh) + var(--en-step-shift-y, 0vh)));
      transition:
        opacity 0.22s ease,
        filter 0.22s ease,
        transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }

    .guide-en-step-img.is-current {
      opacity: 1;
      filter: none;
    }

    .guide-en-step-img.is-disabled {
      opacity: 0.18;
      filter: none;
    }

    .guide-en-step-img.is-completed {
      opacity: 0;
      filter: none;
    }

    .guide-en-steps.is-phone {
      --en-guide-base-y: 19.5vh;
    }

    .guide-en-steps.is-phone .guide-en-step-img {
      object-position: center top;
    }

    /* CN desktop handwriting guide: CN1.png / CN2.png / CN3.png.
       Phone still uses the regular live text guide unless phone images are added later. */
    .guide-cn-steps {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
      user-select: none;

    .guide-cn-step-img {

    .guide-step {
      position: relative;
      display: table;
      margin: 0 0 10px 0;
      font-size: clamp(34px, 5.8vw, 86px);
      line-height: 0.9;
      letter-spacing: -0.07em;
      color: #42bdff;
      -webkit-text-stroke: clamp(1.25px, 0.12vw, 2.2px) #000000;
      paint-order: stroke fill;
      /* Overlapping soft-edged bands leave small, irregular unpainted areas.
         The glyph outline stays typographic and precise. */
      background:
        linear-gradient(176deg,
          #42bdff 0 19%, transparent 19.7% 21.2%,
          #42bdff 22% 47%, rgba(66,189,255,.72) 48% 53%,
          #42bdff 55% 73%, transparent 73.7% 75%, #42bdff 76% 100%),
        repeating-linear-gradient(4deg,
          rgba(255,255,255,.22) 0 1px,
          transparent 1px 8px);
      background-size: 113% 100%, 100% 100%;
      background-position: calc(var(--paint-shift, 0) * 1px) center, center;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition:
        opacity 0.25s ease,
        color 0.25s ease,
        transform 0.25s ease;
    }

    .home.lang-jp .guide-step,
    .home.lang-cn .guide-step {

    .home.lang-ar .guide-step {

    .guide-step.is-disabled {

      -webkit-text-fill-color: #c8c8c8;
      -webkit-text-stroke-color: #c8c8c8;
    }

    .guide-step:nth-child(1) { --paint-shift: -7; }
    .guide-step:nth-child(2) { --paint-shift: 11; }
    .guide-step:nth-child(3) { --paint-shift: -16; }

.khepri-ui {

    function getCurrentHandFrame() {
      const match = currentHandSrc.match(/hand(0[1-9]|10)\.png/);

    function clearHandAnimation() {
      handAnimationTimers.forEach((timer) => clearTimeout(timer));
      handAnimationTimers = [];
      isHandAnimating = false;

    function playHandSequence(sequence, onComplete) {
      clearHandAnimation();

      isHandAnimating = true;
      manualHandMode = true;

      sequence.forEach((frame, index) => {
        const timer = setTimeout(() => {
          setHandFrame(frame);

          if (index === sequence.length - 1) {
            isHandAnimating = false;

            if (typeof onComplete === "function") {
              onComplete();
            }
          }
        }, index * 38);

        handAnimationTimers.push(timer);
      });
    }

    function playHandTo10() {
      const currentFrame = getCurrentHandFrame();
      const start = Math.min(Math.max(currentFrame + 1, 2), 10);
      const sequence = [];

      for (let frame = start; frame <= 10; frame++) {
        sequence.push(frame);
      }

      if (sequence.length === 0) {
        sequence.push(10);
      }

      playHandSequence(sequence, () => {
        handExpanded = true;
        manualHandMode = true;
      });
    }

    function playHandBackTo01() {
      const currentFrame = getCurrentHandFrame();
      const start = Math.max(Math.min(currentFrame - 1, 9), 1);
      const sequence = [];

      for (let frame = start; frame >= 1; frame--) {
        sequence.push(frame);
      }

      if (sequence.length === 0) {
        sequence.push(1);
      }

      playHandSequence(sequence, () => {

    function clampNumber(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function normalizeDegrees(value) {
      return ((value % 360) + 360) % 360;
    }

    function shortestAngleDelta(from, to) {
      return ((to - from + 540) % 360) - 180;
    }

    function getKhepriRotationFromVector(dx, dy) {
      /*
        The default Khepri artwork faces upward.
        atan2 gives 0deg to the right, 90deg downward, -90deg upward.
        So we add 90deg: upward movement keeps the artwork at 0deg,
        right movement becomes 90deg, and so on.
      */
      return normalizeDegrees((Math.atan2(dy, dx) * 180 / Math.PI) + 90);
    }

    function setKhepriRotation(rotation) {
      khepriCurrentRotation = normalizeDegrees(rotation);
      home.style.setProperty("--khepri-rotation", khepriCurrentRotation + "deg");
    }

    function turnKhepriToward(targetRotation, dt) {
      if (!khepriRotationReady) {
        setKhepriRotation(targetRotation);
        khepriRotationReady = true;
        return 0;
      }

      const diff = shortestAngleDelta(khepriCurrentRotation, targetRotation);
      const maxTurn = KHEPRI_ROTATE_SPEED * dt;
      const turn = Math.abs(diff) <= maxTurn ? diff : Math.sign(diff) * maxTurn;

      setKhepriRotation(khepriCurrentRotation + turn);

      return Math.abs(shortestAngleDelta(khepriCurrentRotation, targetRotation));
    }

    function isFlatLayout() {
      return window.matchMedia("(max-height: 620px) and (min-width: 701px)").matches;
    }

    function isMobileKhepriMode() {
      return (
        window.matchMedia("(hover: none) and (pointer: coarse)").matches ||
        window.matchMedia("(max-height: 620px) and (min-width: 701px)").matches ||
        window.matchMedia("(max-width: 900px) and (max-height: 700px)").matches
      );
    }

    function isKhepriCrawlerLayout() {
      return window.innerWidth > 700 &&
        window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    }

    function getKhepriApproxSize() {
      const rect = khepriUi.getBoundingClientRect();
      const width = rect.width || khepriUi.offsetWidth || Math.min(Math.max(window.innerWidth * 0.18, 230), 380);
      const height = rect.height || khepriUi.offsetHeight || width * 0.62;

      return { width, height };
    }

    function clampKhepriPoint(x, y) {
      const size = getKhepriApproxSize();
      const margin = 16;
      const halfW = size.width * 0.5;
      const halfH = size.height * 0.5;

      return {
        x: clampNumber(x, halfW + margin, window.innerWidth - halfW - margin),
        y: clampNumber(y, halfH + margin, window.innerHeight - halfH - margin)
      };
    }

    function getDefaultKhepriPoint() {
      const size = getKhepriApproxSize();

      if (isFlatLayout()) {
        return clampKhepriPoint(
          window.innerWidth * 0.008 + size.width * 0.5,
          window.innerHeight * 0.014 + size.height * 0.5
        );
      }

      return clampKhepriPoint(
        window.innerWidth - window.innerWidth * 0.022 - size.width * 0.5,
        window.innerHeight - window.innerHeight * 0.12 - size.height * 0.5
      );
    }

    function setKhepriPosition(x, y) {
      const point = clampKhepriPoint(x, y);

      khepriCurrentX = point.x;
      khepriCurrentY = point.y;

      home.style.setProperty("--khepri-x", point.x + "px");
      home.style.setProperty("--khepri-y", point.y + "px");
    }

    function initialiseKhepriCrawlerPosition(force = false) {
      if (!isKhepriCrawlerLayout()) return;
      if (khepriPositionReady && !force) return;

      const point = getDefaultKhepriPoint();

      khepriTargetX = point.x;
      khepriTargetY = point.y;
      setKhepriPosition(point.x, point.y);

      if (force || !khepriRotationReady) {
        setKhepriRotation(0);
        khepriRotationReady = true;
      }

      khepriPositionReady = true;
    }

    function clearKhepriCrawlerClasses() {
      khepriButton.classList.remove(
        "is-crawling",
        "is-crawl-left",
        "is-crawl-right"
      );
      khepriCrawling = false;
    }

    function setKhepriCrawlingVisual(active, time = 0) {
      if (!active) {
        clearKhepriCrawlerClasses();
        return;
      }

      khepriButton.classList.remove("force-normal", "is-hover-paused");
      khepriButton.classList.add("is-crawling");

      if (!khepriCrawling || time - khepriLastLegSwitchTime > KHEPRI_LEG_INTERVAL) {
        khepriLegLeft = !khepriLegLeft;
        khepriLastLegSwitchTime = time;
      }

      khepriButton.classList.toggle("is-crawl-left", khepriLegLeft);
      khepriButton.classList.toggle("is-crawl-right", !khepriLegLeft);
      khepriCrawling = true;
    }

    function canKhepriCrawl() {
      return khepriCrawlerEnabled &&
        home.classList.contains("guide-complete") &&
        !isSelected &&
        !khepriHovered &&
        !khepriButton.classList.contains("is-copied") &&
        performance.now() > khepriPausedUntil;
    }

    function startKhepriCrawlerLoop() {
      if (khepriCrawlerFrameId) return;
      khepriLastFrameTime = 0;
      khepriCrawlerFrameId = requestAnimationFrame(animateKhepriCrawler);
    }

    function stopKhepriCrawlerLoop() {
      if (!khepriCrawlerFrameId) return;
      cancelAnimationFrame(khepriCrawlerFrameId);
      khepriCrawlerFrameId = null;
      khepriLastFrameTime = 0;
      clearKhepriCrawlerClasses();
    }

    function animateKhepriCrawler(time) {
      khepriCrawlerFrameId = requestAnimationFrame(animateKhepriCrawler);

      if (!canKhepriCrawl()) {
        clearKhepriCrawlerClasses();
        khepriLastFrameTime = time;
        return;
      }

      initialiseKhepriCrawlerPosition();

      const dt = khepriLastFrameTime ? Math.min((time - khepriLastFrameTime) / 1000, 0.05) : 0;
      khepriLastFrameTime = time;

      const dx = khepriTargetX - khepriCurrentX;
      const dy = khepriTargetY - khepriCurrentY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (pauseKhepriIfCloseToPointer()) {
        khepriLastFrameTime = time;
        return;
      }

      if (distance <= KHEPRI_STOP_DISTANCE || dt === 0) {
        clearKhepriCrawlerClasses();
        return;
      }

      const targetRotation = getKhepriRotationFromVector(dx, dy);
      const remainingRotation = turnKhepriToward(targetRotation, dt);

      /*
        To avoid the beetle looking like it is sliding sideways or walking backward,
        it first turns its head toward the target. It only starts moving forward
        once the body is almost aligned with the direction of travel.
      */
      if (remainingRotation > KHEPRI_MOVE_START_ANGLE) {
        setKhepriCrawlingVisual(true, time);
        return;
      }

      const step = Math.min(distance, KHEPRI_CRAWL_SPEED * dt);
      const nextX = khepriCurrentX + (dx / distance) * step;
      const nextY = khepriCurrentY + (dy / distance) * step;

      setKhepriPosition(nextX, nextY);
      eraseLivingStrokeByKhepriTrail(nextX, nextY, dx / distance, dy / distance);
      setKhepriCrawlingVisual(true, time);
    }

    function updateKhepriCrawlerMode() {
      const enabled = isKhepriCrawlerLayout();

      khepriCrawlerEnabled = enabled;
      home.classList.toggle("khepri-crawler-ready", enabled);

      if (!enabled) {
        clearTimeout(khepriMouseIdleTimer);
        khepriMouseIdleTimer = null;
        khepriPositionReady = false;
        khepriHovered = false;
        khepriRotationReady = false;
        clearTimeout(khepriEnterTimer);
        khepriEnterTimer = null;
        home.classList.remove("khepri-crawler-entered");
        setKhepriRotation(0);
        khepriButton.classList.remove("is-hover-paused");
        stopKhepriCrawlerLoop();
        return;
      }

      initialiseKhepriCrawlerPosition();
      startKhepriCrawlerLoop();
    }

    function getKhepriCursorPauseRadius() {
      const size = getKhepriApproxSize();
      const core = Math.min(size.width, size.height);
      return Math.max(KHEPRI_CURSOR_PAUSE_MIN_RADIUS, core * KHEPRI_CURSOR_PAUSE_RADIUS_RATIO);
    }

    function pauseKhepriIfCloseToPointer() {
      if (!isKhepriCrawlerLayout()) return false;
      if (!home.classList.contains("guide-complete")) return false;
      if (khepriHovered || isSelected) return false;

      const dx = khepriPointerX - khepriCurrentX;
      const dy = khepriPointerY - khepriCurrentY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const radius = getKhepriCursorPauseRadius();

      if (distance > radius) return false;

      khepriHovered = true;
      pauseKhepriCrawler(0);
      khepriButton.classList.remove("force-normal", "is-crawling", "is-crawl-left", "is-crawl-right");

      if (!khepriButton.classList.contains("is-copied")) {
        khepriButton.classList.add("is-hover-paused");
      }

      return true;
    }

    function scheduleKhepriTargetFromPointer(x, y) {
      if (!isKhepriCrawlerLayout()) return;

      khepriPointerX = x;
      khepriPointerY = y;

      clearTimeout(khepriMouseIdleTimer);

      khepriMouseIdleTimer = setTimeout(() => {
        if (!isKhepriCrawlerLayout() || khepriHovered || isSelected) return;

        const target = clampKhepriPoint(khepriPointerX, khepriPointerY);
        khepriTargetX = target.x;
        khepriTargetY = target.y;
        startKhepriCrawlerLoop();
      }, KHEPRI_MOUSE_IDLE_MS);
    }

    function pauseKhepriCrawler(duration = 0) {
      khepriPausedUntil = performance.now() + duration;
      clearTimeout(khepriMouseIdleTimer);
      khepriMouseIdleTimer = null;

      /* 暂停时把目标点重置为当前位置。
         这样被 hover 叫停、点击复制、拿起笔暂停之后，都不会继续沿着旧路线走。 */
      khepriTargetX = khepriCurrentX;
      khepriTargetY = khepriCurrentY;

      clearKhepriCrawlerClasses();
    }

    function getAboutReadingRect() {
      if (window.innerWidth <= 700) return null;

      const panelRect = aboutPanel.getBoundingClientRect();

      /* During the slide-down transition, getBoundingClientRect can report an
         in-between transformed position. For the escape decision we want the
         final reading area, so this fallback mirrors the desktop CSS values. */
      const width = Math.min(window.innerWidth * 0.44, 620);
      const right = window.innerWidth * 0.024;
      const top = window.innerHeight * (isFlatLayout() ? 0.37 : 0.34);
      const height = window.innerHeight * (isFlatLayout() ? 0.55 : 0.60);

      if (home.classList.contains("about-open")) {
        return {
          left: window.innerWidth - right - width,
          right: window.innerWidth - right,
          top,
          bottom: Math.min(window.innerHeight, top + height),
          width,
          height: Math.min(window.innerHeight - top, height)
        };
      }

      if (panelRect.width > 20 && panelRect.height > 20) {
        return panelRect;
      }

      return null;
    }

    function isPointInsideRectWithPadding(x, y, rect, padding) {
      if (!rect) return false;

      return x >= rect.left - padding &&
        x <= rect.right + padding &&
        y >= rect.top - padding &&
        y <= rect.bottom + padding;
    }

    function getKhepriAboutEscapePoint(rect) {
      const size = getKhepriApproxSize();
      const margin = KHEPRI_ABOUT_ESCAPE_MARGIN;

      const candidates = [
        {
          x: rect.left - size.width * 0.62 - margin,
          y: rect.top + size.height * 0.72
        },
        {
          x: rect.left - size.width * 0.62 - margin,
          y: Math.min(rect.bottom - size.height * 0.72, window.innerHeight * 0.72)
        },
        {
          x: window.innerWidth * 0.24,
          y: window.innerHeight * 0.58
        },
        {
          x: window.innerWidth * 0.16,
          y: window.innerHeight * 0.30
        }
      ];

      for (const candidate of candidates) {
        const point = clampKhepriPoint(candidate.x, candidate.y);

        if (!isPointInsideRectWithPadding(
          point.x,
          point.y,
          rect,
          KHEPRI_ABOUT_ESCAPE_PADDING * 0.45
        )) {
          return point;
        }
      }

      return clampKhepriPoint(
        window.innerWidth * 0.18,
        window.innerHeight * 0.50
      );
    }

    function resetKhepriHoverWave() {
      khepriHoverWaveDistance = 0;
      khepriHoverWaveLastX = null;
      khepriHoverWaveLastY = null;
      khepriHoverWaveLastTime = 0;
    }

    function commandKhepriAwayFromPointer(x, y) {
      if (!isKhepriCrawlerLayout()) return false;
      if (!home.classList.contains("guide-complete")) return false;
      if (isSelected) return false;

      initialiseKhepriCrawlerPosition();

      let escapePoint = null;
      const rect = getAboutReadingRect();

      if (home.classList.contains("about-open") && rect) {
        escapePoint = getKhepriAboutEscapePoint(rect);
      } else {
        const dx = khepriCurrentX - x;
        const dy = khepriCurrentY - y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const awayX = dx / len;
        const awayY = dy / len;
        const side = Math.random() < 0.5 ? -1 : 1;

        escapePoint = clampKhepriPoint(
          khepriCurrentX + awayX * KHEPRI_HOVER_ESCAPE_DISTANCE + (-awayY) * 90 * side,
          khepriCurrentY + awayY * KHEPRI_HOVER_ESCAPE_DISTANCE + awayX * 90 * side
        );
      }

      khepriHovered = false;
      resetKhepriHoverWave();
      khepriButton.classList.remove("is-hover-paused", "force-normal");

      commandKhepriToPoint(escapePoint.x, escapePoint.y);
      return true;
    }

    function handleKhepriHoverWave(event) {
      if (!isKhepriCrawlerLayout()) return;
      if (!home.classList.contains("guide-complete")) return;
      if (isSelected) return;

      const now = performance.now();
      const x = event.clientX;
      const y = event.clientY;

      if (
        khepriHoverWaveLastX === null ||
        now - khepriHoverWaveLastTime > KHEPRI_HOVER_WAVE_RESET_MS
      ) {
        khepriHoverWaveDistance = 0;
      } else {
        khepriHoverWaveDistance += Math.hypot(
          x - khepriHoverWaveLastX,
          y - khepriHoverWaveLastY
        );
      }

      khepriHoverWaveLastX = x;
      khepriHoverWaveLastY = y;
      khepriHoverWaveLastTime = now;

      if (khepriHoverWaveDistance >= KHEPRI_HOVER_WAVE_DISTANCE) {
        commandKhepriAwayFromPointer(x, y);
      }
    }

    function commandKhepriToPoint(x, y) {
      if (!isKhepriCrawlerLayout()) return;

      initialiseKhepriCrawlerPosition();

      const target = clampKhepriPoint(x, y);

      clearTimeout(khepriMouseIdleTimer);
      khepriMouseIdleTimer = null;
      khepriPausedUntil = 0;

      khepriTargetX = target.x;
      khepriTargetY = target.y;

      khepriButton.classList.remove(
        "force-normal",
        "is-hover-paused",
        "is-stage-two",
        "is-crawling",
        "is-crawl-left",
        "is-crawl-right"
      );

      startKhepriCrawlerLoop();
    }

    function commandKhepriAwayFromAboutIfNeeded() {
      if (!isKhepriCrawlerLayout()) return false;
      if (!home.classList.contains("about-open")) return false;

      initialiseKhepriCrawlerPosition();

      const rect = getAboutReadingRect();
      if (!rect) return false;

      clearTimeout(khepriMouseIdleTimer);
      khepriMouseIdleTimer = null;

      const isInReadingArea = isPointInsideRectWithPadding(
        khepriCurrentX,
        khepriCurrentY,
        rect,
        KHEPRI_ABOUT_ESCAPE_PADDING
      );

      if (!isInReadingArea) {
        return false;
      }

      const escapePoint = getKhepriAboutEscapePoint(rect);
      commandKhepriToPoint(escapePoint.x, escapePoint.y);

      return true;
    }

    function triggerKhepriWindowPanic() {
      if (!isKhepriCrawlerLayout()) return;
      if (!home.classList.contains("guide-complete")) return;
      if (isSelected) return;

      clearTimeout(khepriWindowPanicTimer);

      khepriWindowPanicTimer = setTimeout(() => {
        if (!isKhepriCrawlerLayout()) return;
        if (!home.classList.contains("guide-complete")) return;
        if (isSelected) return;

        initialiseKhepriCrawlerPosition();
        khepriHovered = false;
        khepriButton.classList.remove("is-hover-paused", "force-normal");

        const angle = Math.random() * Math.PI * 2;
        const distance = Math.max(180, Math.min(window.innerWidth, window.innerHeight) * (0.24 + Math.random() * 0.34));
        let targetX = khepriCurrentX + Math.cos(angle) * distance;
        let targetY = khepriCurrentY + Math.sin(angle) * distance;

        const panicPoint = clampKhepriPoint(targetX, targetY);
        commandKhepriToPoint(panicPoint.x, panicPoint.y);
      }, KHEPRI_WINDOW_PANIC_DELAY);
    }

    function resetKhepriCrawlerToDefault() {
      clearTimeout(khepriMouseIdleTimer);
      khepriMouseIdleTimer = null;
      khepriButton.classList.remove("is-hover-paused");
      khepriHovered = false;

      if (!isKhepriCrawlerLayout()) {
        stopKhepriCrawlerLoop();
        khepriPositionReady = false;
        return;
      }

      initialiseKhepriCrawlerPosition(true);
      startKhepriCrawlerLoop();
    }

    function getSelectedPenAngle() {
      const baseAngle = isFlatLayout() ? 90 : 0;
      const selectedAngle = baseAngle + 18;
      return selectedAngle * Math.PI / 180;
    }

    function updateGuideEnglishAssets() {
      const isPhoneGuide = window.innerWidth <= 700;
      const sources = isPhoneGuide ? guideEnPhoneSources : guideEnDesktopSources;

      guideEnSteps.classList.toggle("is-phone", isPhoneGuide);

      guideEnStepImages.forEach((img, index) => {
        const nextSrc = sources[index];
        const currentAttr = img.getAttribute("src");
        if (currentAttr !== nextSrc) {
          img.setAttribute("src", nextSrc);
        }
      });
    }

    function updateGuideEnglishSteps() {
      const states = [
        step1Done ? "completed" : "current",
        !step1Done ? "disabled" : (step2Done ? "completed" : "current"),
        !step2Done ? "disabled" : (step3Done ? "completed" : "current")
      ];

      const rise = isFlatLayout() ? EN_STEP_RISE_FLAT_VH : EN_STEP_RISE_DESKTOP_VH;

      /*
        This recreates the original typed-guide behavior:
        when step 1 is done, step 2 and step 3 move up by one row;
        when step 2 is also done, step 3 moves up by two rows.
      */
      const shiftY = [
        0,
        step1Done ? -rise : 0,
        step2Done ? -rise * 2 : (step1Done ? -rise : 0)
      ];

      guideEnStepImages.forEach((img, index) => {
        const state = states[index];

        img.classList.toggle("is-current", state === "current");
        img.classList.toggle("is-disabled", state === "disabled");
        img.classList.toggle("is-completed", state === "completed");
        img.style.setProperty("--en-step-shift-y", shiftY[index] + "vh");
      });
    }

    function updateGuideChineseSteps() {
      const states = [
        step1Done ? "completed" : "current",
        !step1Done ? "disabled" : (step2Done ? "completed" : "current"),
        !step2Done ? "disabled" : (step3Done ? "completed" : "current")
      ];

      const rise = isFlatLayout() ? EN_STEP_RISE_FLAT_VH : EN_STEP_RISE_DESKTOP_VH;

      const shiftY = [
        0,
        step1Done ? -rise : 0,
        step2Done ? -rise * 2 : (step1Done ? -rise : 0)
      ];

      guideCnStepImages.forEach((img, index) => {
        const state = states[index];

        img.classList.toggle("is-current", state === "current");
        img.classList.toggle("is-disabled", state === "disabled");
        img.classList.toggle("is-completed", state === "completed");
        img.style.setProperty("--cn-step-shift-y", shiftY[index] + "vh");
      });
    }

    function updateGuide() {
      guideStep1.classList.toggle("is-completed", step1Done);
      guideStep2.classList.toggle("is-completed", step2Done);
      guideStep3.classList.toggle("is-completed", step3Done);

      guideStep2.classList.toggle("is-disabled", !step1Done);
      guideStep3.classList.toggle("is-disabled", !step2Done);

      updateGuideEnglishAssets();
      updateGuideEnglishSteps();
      updateGuideChineseSteps();

      const guideComplete = step1Done && step2Done && step3Done;
      const wasGuideComplete = home.classList.contains("guide-complete");
      home.classList.toggle("guide-complete", guideComplete);

      updateKhepriCrawlerMode();

      if (guideComplete && !wasGuideComplete && isKhepriCrawlerLayout()) {
        clearTimeout(khepriEnterTimer);
        home.classList.remove("khepri-crawler-entered");

        khepriEnterTimer = setTimeout(() => {
          home.classList.add("khepri-crawler-entered");
        }, 1150);
      }

      if (!guideComplete) {
        clearTimeout(khepriEnterTimer);
        khepriEnterTimer = null;
        home.classList.remove("khepri-crawler-entered");
        closeAbout();
      }
    }

    function updateHandFrameByWidth() {
      const w = window.innerWidth;
      const clickReady = w > 700 && !isFlatLayout();

      home.classList.toggle("hand-click-ready", clickReady);

      if (isHandAnimating) {
        return;
      }

      const progress = clampNumber(
        (HAND_MAX_WIDTH - w) / (HAND_MAX_WIDTH - HAND_MIN_WIDTH),
        0,
        1
      );

      let nextFrame = 1;

      /*
        通常状态：窗口从宽到窄时，hand01 → hand05。
        点击手之后：hand10 成为新的最宽状态，窗口从宽到窄时，hand10 → hand05。
      */
      if (clickReady && handExpanded) {
        manualHandMode = true;

        if (progress < 0.36) {
          nextFrame = 10;
        } else if (progress < 0.50) {
          nextFrame = 9;
        } else if (progress < 0.64) {
          nextFrame = 8;
        } else if (progress < 0.78) {
          nextFrame = 7;
        } else if (progress < 0.90) {
          nextFrame = 6;
        } else {
          nextFrame = 5;
        }
      } else {
        if (clickReady && manualHandMode) {
          return;
        }

        manualHandMode = false;
        handExpanded = false;

        if (progress < 0.45) {
          nextFrame = 1;
        } else if (progress < 0.60) {
          nextFrame = 2;
        } else if (progress < 0.75) {
          nextFrame = 3;
        } else if (progress < 0.90) {
          nextFrame = 4;
        } else {
          nextFrame = 5;
        }
      }

      const nextSrc = `hand${String(nextFrame).padStart(2, "0")}.png`;

      if (nextSrc !== currentHandSrc) {
        setHandFrame(nextFrame);
      }
    }

    function updateAboutRotationByWidth() {
      const w = window.innerWidth;

      const progress = clampNumber(
        (ABOUT_ROTATE_START - w) / (ABOUT_ROTATE_START - ABOUT_ROTATE_END),
        0,
        1
      );

      const rotation = -90 * progress;
      const shiftX = -44 - 120 * progress;
      const shiftY = 70 * progress;

      home.style.setProperty("--about-rotate", rotation + "deg");
      home.style.setProperty("--about-shift-x", shiftX + "px");
      home.style.setProperty("--about-shift-y", shiftY + "px");

      home.classList.toggle(
        "about-vertical",
        progress > ABOUT_VERTICAL_THRESHOLD && w > 700
      );
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;

      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      updateHandFrameByWidth();
      updateAboutRotationByWidth();
      updateKhepriCrawlerMode();

      if (khepriCrawlerEnabled) {
        const point = clampKhepriPoint(khepriCurrentX || getDefaultKhepriPoint().x, khepriCurrentY || getDefaultKhepriPoint().y);
        setKhepriPosition(point.x, point.y);
        khepriTargetX = clampNumber(khepriTargetX || point.x, point.x - window.innerWidth, window.innerWidth * 2);
        khepriTargetY = clampNumber(khepriTargetY || point.y, point.y - window.innerHeight, window.innerHeight * 2);
      }

      if (window.innerWidth > 820) {
        languageSwitch.classList.remove("is-open");
      }

      if (isSelected) {
        movePenTipTo(lastMouseX, lastMouseY);
      }
    }

    function clearIdlePenShake() {
      home.style.setProperty("--idle-shake-x", "0px");
      home.style.setProperty("--idle-shake-y", "0px");
      home.style.setProperty("--idle-shake-r", "0deg");
    }

    function animateIdlePenShake(time) {
      const desktopPointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      const active = desktopPointer && !isSelected && !home.classList.contains("guide-complete");

      if (!active) {
        clearIdlePenShake();
        idlePenShakeFrame = requestAnimationFrame(animateIdlePenShake);
        return;
      }

      const rect = penWrap.getBoundingClientRect();
      const centerX = rect.left + rect.width * 0.5;
      const centerY = rect.top + rect.height * 0.5;
      const distance = Math.hypot(idlePenPointerX - centerX, idlePenPointerY - centerY);
      const influenceRadius = Math.max(360, Math.min(window.innerWidth, window.innerHeight) * 0.62);
      const proximity = Math.pow(clampNumber(1 - distance / influenceRadius, 0, 1), 1.7);

      /* Two mismatched frequencies keep the movement physical and slightly uncanny. */
      const x = (Math.sin(time * 0.071) + Math.sin(time * 0.113 + 1.7) * 0.55) * 1.55 * proximity;
      const y = (Math.sin(time * 0.083 + 2.1) + Math.sin(time * 0.137) * 0.42) * 1.25 * proximity;
      const rotation = (Math.sin(time * 0.061 + 0.8) + Math.sin(time * 0.127) * 0.35) * 0.34 * proximity;

      home.style.setProperty("--idle-shake-x", x.toFixed(3) + "px");
      home.style.setProperty("--idle-shake-y", y.toFixed(3) + "px");
      home.style.setProperty("--idle-shake-r", rotation.toFixed(3) + "deg");
      idlePenShakeFrame = requestAnimationFrame(animateIdlePenShake);
    }

    function handlePenDeviceOrientation(event) {
      if (window.innerWidth > 700 || isSelected || home.classList.contains("guide-complete")) {
        gyroTargetRotation = 0;
        return;
      }

      const portrait = window.innerHeight >= window.innerWidth;
      const rawTilt = portrait ? event.gamma : event.beta;
      if (typeof rawTilt !== "number" || !Number.isFinite(rawTilt)) return;

      const orientationSign = portrait || window.orientation === 90 ? 1 : -1;
      const tiltAfterDeadZone = Math.abs(rawTilt) < 3 ? 0 : rawTilt - Math.sign(rawTilt) * 3;
      gyroTargetRotation = clampNumber(-tiltAfterDeadZone * orientationSign, -24, 24);
    }

    function animatePenGyroscope() {
      if (window.innerWidth > 700 || isSelected || home.classList.contains("guide-complete")) {
        gyroTargetRotation = 0;
      }

      /* A damped spring runs at display refresh rate, independent of sensor frequency. */
      gyroVelocity += (gyroTargetRotation - gyroRotation) * 0.032;
      gyroVelocity *= 0.80;
      gyroRotation += gyroVelocity;

      if (Math.abs(gyroTargetRotation - gyroRotation) < 0.002 && Math.abs(gyroVelocity) < 0.002) {
        gyroRotation = gyroTargetRotation;
        gyroVelocity = 0;
      }

      home.style.setProperty("--gyro-rotation", gyroRotation.toFixed(2) + "deg");
      gyroAnimationFrame = requestAnimationFrame(animatePenGyroscope);
    }

    async function enablePenGyroscope() {
      if (gyroPermissionStarted || gyroPermissionPending || window.innerWidth > 700 || !("DeviceOrientationEvent" in window)) return;
      gyroPermissionPending = true;

      try {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            gyroPermissionPending = false;
            return;
          }
        }
        window.addEventListener("deviceorientation", handlePenDeviceOrientation, { passive: true });
        gyroPermissionStarted = true;
      } catch (error) {
        /* A later user gesture may retry if this gesture was not accepted. */
      } finally {
        gyroPermissionPending = false;
      }
    }

    /* Browsers without a permission prompt can begin listening immediately. */
    if (!(typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function")) {
      enablePenGyroscope();
    }

    window.addEventListener("pointermove", (event) => {
      idlePenPointerX = event.clientX;
      idlePenPointerY = event.clientY;
    }, { passive: true });

    idlePenShakeFrame = requestAnimationFrame(animateIdlePenShake);
    gyroAnimationFrame = requestAnimationFrame(animatePenGyroscope);

    resizeCanvas();
    updateGuide();
    setLanguage("en");
    setPenColor("bw");

        function handleWindowResize() {
      resizeCanvas();
      updateGuideEnglishAssets();
      triggerKhepriWindowPanic();
    }

    window.addEventListener("resize", handleWindowResize);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", handleWindowResize);
    }

    window.addEventListener("focus", () => {
      triggerKhepriWindowPanic();
    });

    function clearCanvas() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    function stopLivingStroke() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      khepriLastEraseX = null;
      khepriLastEraseY = null;
    }

    function pickUpPen(mouseX, mouseY, shouldIgnoreNextPointerUp = true) {
      isSelected = true;
      ignoreNextPointerUp = shouldIgnoreNextPointerUp;
      lastPenPickupTime = performance.now();
      ignoreUpUntil = lastPenPickupTime + 520;
      isDrawing = false;
      hasMoved = false;
      lastPoint = null;
      currentStroke = [];
      livingSegments = [];
      livingSegmentMeta = [];
      livingStroke = [];

      lastMouseX = mouseX;
      lastMouseY = mouseY;

      stopLivingStroke();
      clearCanvas();

      pauseKhepriCrawler(0);

      home.classList.add("pen-mode");
      document.documentElement.classList.add("pen-mode-active");
      document.body.classList.add("pen-mode-active");
      penWrap.classList.add("is-selected");

      /* 拿起笔后通常收起可能打开的 UI；但手机端 about 打开时，保留文本，让用户可以在上面乱涂乱画 */
      const keepMobileAboutOpen = window.innerWidth <= 700 && home.classList.contains("about-open");

      if (!keepMobileAboutOpen) {
        closeAbout();
      }

      languageSwitch.classList.remove("is-open");

      /* 笔被拿起的瞬间，笔尖立刻取代鼠标位置 */
      movePenTipTo(mouseX, mouseY);
    }

    function putDownPen() {
      isSelected = false;
      ignoreNextPointerUp = false;
      ignoreUpUntil = 0;
      isDrawing = false;
      hasMoved = false;
      lastPoint = null;
      currentStroke = [];

      home.classList.remove("pen-mode");
      document.documentElement.classList.remove("pen-mode-active");
      document.body.classList.remove("pen-mode-active");
      penWrap.classList.remove("is-selected");

      penWrap.style.left = "";
      penWrap.style.top = "";

      scheduleKhepriTargetFromPointer(lastMouseX, lastMouseY);
    }

    function rotateLocalOffset(x, y, angle) {
      return {
        x: x * Math.cos(angle) - y * Math.sin(angle),
        y: x * Math.sin(angle) + y * Math.cos(angle)
      };
    }

    function getPenTipLocalOffset() {
      return {
        x: penWrap.offsetWidth * penTipOffsetXRatio,
        y: penWrap.offsetHeight * penTipOffsetYRatio
      };
    }

    function getPenTipPoint() {
      const left = parseFloat(penWrap.style.left) || (penWrap.getBoundingClientRect().left + penWrap.getBoundingClientRect().width * 0.5);
      const top = parseFloat(penWrap.style.top) || (penWrap.getBoundingClientRect().top + penWrap.getBoundingClientRect().height * 0.5);
      const angle = getSelectedPenAngle();
      const local = getPenTipLocalOffset();
      const rotated = rotateLocalOffset(local.x, local.y, angle);

      return {
        x: left + rotated.x + inkTrailNudgeX,
        y: top + rotated.y + inkTrailNudgeY
      };
    }

    function movePenTipTo(mouseX, mouseY) {
      lastMouseX = mouseX;
      lastMouseY = mouseY;

      const angle = getSelectedPenAngle();
      const local = getPenTipLocalOffset();
      const rotated = rotateLocalOffset(local.x, local.y, angle);

      const centerX = mouseX - rotated.x - inkTrailNudgeX;
      const centerY = mouseY - rotated.y - inkTrailNudgeY;

      penWrap.style.left = centerX + "px";
      penWrap.style.top = centerY + "px";
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function drawBlueBallpointSegment(from, to) {
      ctx.beginPath();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 2.7;
      ctx.strokeStyle = "#005fc8";
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
    }

    function drawLine(from, to) {
      if (getCurrentInkMode() === "blue") {
        drawBlueBallpointSegment(from, to);
        return;
      }

      ctx.beginPath();
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = getCurrentInkColor();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
    }

    function simplifyStroke(points, step = 2) {
      const out = [];

      for (let i = 0; i < points.length; i += step) {
        out.push(points[i]);
      }

      if (points.length > 1 && out[out.length - 1] !== points[points.length - 1]) {
        out.push(points[points.length - 1]);
      }

      return out;
    }

    function getNormal(points, index) {
      const prev = points[Math.max(0, index - 1)];
      const next = points[Math.min(points.length - 1, index + 1)];

      let dx = next.x - prev.x;
      let dy = next.y - prev.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;

      dx /= len;
      dy /= len;

      return {
        x: -dy,
        y: dx
      };
    }

    function pickRandomAnimationType() {
      const r = Math.random();

      if (r < 0.45) return "wriggle";
      if (r < 0.8) return "pulse";
      return "flow";
    }

    function createSegmentMeta(index = 0, preferCrazy = false, mode = livingInkMode) {
      const isBlue = mode === "blue";

      if (isBlue) {
        const blueTypes = preferCrazy ?
          ["blueWave", "blueWave", "bluePeak", "bluePeak", "bluePeak"] :
          ["blueWave", "bluePeak", "blueWave"];
        const type = blueTypes[Math.floor(Math.random() * blueTypes.length)];

        return {
          type,
          mode,
          color: "#005fc8",
          seed: Math.random() * 1000 + index * 19,
          amp: preferCrazy ? 1.25 + Math.random() * 0.95 : 0.95 + Math.random() * 0.45,
          speed: preferCrazy ? 1.05 + Math.random() * 0.85 : 0.85 + Math.random() * 0.45,
          sharpness: preferCrazy ? 1.35 + Math.random() * 0.95 : 0.8 + Math.random() * 0.55,
          orbit: Math.random() * Math.PI * 2
        };
      }

      const calmTypes = ["wriggle", "pulse", "flow"];

      /*
        After Khepri cuts a living stroke, the fragments keep the exaggerated,
        charged movement, but they no longer turn into triangle / square / polygon
        geometry. They remain broken lines that dance more violently.
      */
      const crazyTypes = [
        "wriggle",
        "wriggle",
        "wriggle",
        "pulse",
        "pulse",
        "flow",
        "flow"
      ];
      const types = preferCrazy ? crazyTypes : calmTypes;
      const type = types[Math.floor(Math.random() * types.length)];

      return {
        type,
        mode,
        color: "#000000",
        seed: Math.random() * 1000 + index * 17,
        amp: preferCrazy ? 1.45 + Math.random() * 0.75 : 0.85 + Math.random() * 0.45,
        speed: preferCrazy ? 1.15 + Math.random() * 0.65 : 0.85 + Math.random() * 0.35,
        spin: (Math.random() < 0.5 ? -1 : 1) * (0.55 + Math.random() * 0.95),
        orbit: Math.random() * Math.PI * 2
      };
    }

    function rebuildLivingStrokeFromSegments() {
      livingStroke = livingSegments.flat();
    }

    function startLivingStroke(points) {
      stopLivingStroke();

      const simplified = simplifyStroke(points, 2);

      if (simplified.length < 2) return;

      livingInkColor = getCurrentInkColor();
      livingInkMode = getCurrentInkMode();

      livingStroke = simplified;
      livingSegments = [simplified];
      livingSegmentMeta = [createSegmentMeta(0, false, livingInkMode)];
      currentAnimationType = null;
      khepriLastEraseX = null;
      khepriLastEraseY = null;
      animationId = requestAnimationFrame(animateStroke);
    }

    function animateStroke(time) {
      clearCanvas();

      livingSegments = livingSegments.filter((segment) => segment.length >= 2);

      if (livingSegments.length === 0) {
        stopLivingStroke();
        return;
      }

      livingSegments.forEach((segment, index) => {
        if (!livingSegmentMeta[index]) {
          livingSegmentMeta[index] = createSegmentMeta(index, true, livingInkMode);
        }

        const meta = livingSegmentMeta[index];

        if (meta.type === "blueWave") {
          drawBlueWaveStroke(time, segment, meta, index);
        } else if (meta.type === "bluePeak") {
          drawBluePeakStroke(time, segment, meta, index);
        } else if (meta.type === "wriggle") {
          drawWriggleStroke(time, segment, meta, index);
        } else if (meta.type === "pulse") {
          drawPulseStroke(time, segment, meta, index);
        } else {
          drawFlowStroke(time, segment, meta, index);
        }
      });

      animationId = requestAnimationFrame(animateStroke);
    }

    function drawWriggleStroke(time, stroke, meta, segmentIndex = 0) {
      ctx.beginPath();
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = meta.color || livingInkColor;

      for (let i = 0; i < stroke.length; i++) {
        const p = stroke[i];
        const t = time * 0.001 * meta.speed + meta.seed;

        const waveX =
          Math.sin(t * 4.0 + i * 0.32 + segmentIndex) * 3.2 * meta.amp +
          Math.cos(t * 2.2 + i * 0.11) * 1.4 * meta.amp;

        const waveY =
          Math.cos(t * 3.6 + i * 0.28) * 3.2 * meta.amp +
          Math.sin(t * 2.8 + i * 0.16 + segmentIndex) * 1.4 * meta.amp;

        const x = p.x + waveX;
        const y = p.y + waveY;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();
    }

    function drawPulseStroke(time, stroke, meta, segmentIndex = 0) {
      const count = stroke.length;
      const centerIndex = ((time * 0.012 * meta.speed + meta.seed) % (count + 36)) - 18;
      const sigma = Math.max(5, count * 0.08);

      const transformed = [];

      for (let i = 0; i < count; i++) {
        const p = stroke[i];
        const normal = getNormal(stroke, i);

        const dist = i - centerIndex;
        const bulge = Math.exp(-(dist * dist) / (2 * sigma * sigma));
        const offset = bulge * 14 * meta.amp;

        transformed.push({
          x: p.x + normal.x * offset,
          y: p.y + normal.y * offset,
          weight: bulge
        });
      }

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = meta.color || livingInkColor;

      for (let i = 1; i < transformed.length; i++) {
        const a = transformed[i - 1];
        const b = transformed[i];

        const w = 2.4 + ((a.weight + b.weight) * 0.5) * 10 * meta.amp;

        ctx.beginPath();
        ctx.lineWidth = w;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function drawFlowStroke(time, stroke, meta, segmentIndex = 0) {
      const count = stroke.length;
      const centerIndex = ((time * 0.014 * meta.speed + meta.seed) % (count + 44)) - 22;
      const sigma = Math.max(6, count * 0.1);

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = meta.color || livingInkColor;

      for (let i = 1; i < count; i++) {
        const a = stroke[i - 1];
        const b = stroke[i];

        const midIndex = i - 0.5;
        const dist = midIndex - centerIndex;
        const focus = Math.exp(-(dist * dist) / (2 * sigma * sigma));

        const lineWidth = 1.5 + focus * 11 * meta.amp;

        ctx.beginPath();
        ctx.lineWidth = lineWidth;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function strokeBlueInkPolyline(points, time, meta, segmentIndex = 0, widthBonus = 0) {
      if (points.length < 2) return;

      const t = time * 0.001 * meta.speed + meta.seed;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = meta.color || livingInkColor;

      for (let i = 1; i < points.length; i++) {
        const a = points[i - 1];
        const b = points[i];
        const progress = i / Math.max(1, points.length - 1);
        const perspective = 0.85 + Math.pow(progress, 0.9) * (1.25 + widthBonus);
        const pulse = 0.92 + 0.08 * Math.sin(t * 4.6 + i * 0.42 + segmentIndex + meta.orbit);

        ctx.beginPath();
        ctx.lineWidth = 1.7 + perspective * pulse;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function drawBlueWaveStroke(time, stroke, meta, segmentIndex = 0) {
      if (stroke.length < 2) return;

      const points = [];
      const t = time * 0.001 * meta.speed + meta.seed;
      const waveLength = 0.42 + Math.sin(t * 0.7 + segmentIndex) * 0.08;

      for (let i = 0; i < stroke.length; i++) {
        const p = stroke[i];
        const normal = getNormal(stroke, i);
        const slowWave = Math.sin(i * waveLength + t * 4.2 + segmentIndex) * 8.2 * meta.amp;
        const smallWave = Math.sin(i * 1.18 - t * 6.8) * 1.9 * meta.amp;
        points.push({
          x: p.x + normal.x * (slowWave + smallWave),
          y: p.y + normal.y * (slowWave + smallWave)
        });
      }

      strokeBlueInkPolyline(points, time, meta, segmentIndex, 0.1);
    }

    function drawBluePeakStroke(time, stroke, meta, segmentIndex = 0) {
      if (stroke.length < 2) return;

      const t = time * 0.001 * meta.speed + meta.seed;
      const peakSpacing = Math.max(3, Math.round(7 - meta.sharpness * 2));
      const points = [];

      for (let i = 0; i < stroke.length; i++) {
        const p = stroke[i];
        const normal = getNormal(stroke, i);
        const trianglePhase = ((i + Math.floor(t * 7)) % (peakSpacing * 2)) / peakSpacing;
        const triangle = trianglePhase <= 1 ? trianglePhase : 2 - trianglePhase;
        const sign = ((Math.floor((i + Math.floor(t * 4)) / peakSpacing) + segmentIndex) % 2 === 0) ? 1 : -1;
        const spike = (triangle * 2 - 0.35) * sign * 12.6 * meta.amp * meta.sharpness;
        const jitter = Math.sin(t * 8.4 + i * 0.73 + meta.orbit) * 1.8 * meta.amp;

        points.push({
          x: p.x + normal.x * (spike + jitter),
          y: p.y + normal.y * (spike + jitter)
        });
      }

      strokeBlueInkPolyline(points, time, meta, segmentIndex, 0.45);
    }

    function eraseLivingStrokeAt(x, y, radius) {
      if (!livingSegments.length) return false;

      const radiusSq = radius * radius;
      const newSegments = [];
      const newMeta = [];
      let changed = false;

      livingSegments.forEach((segment, segmentIndex) => {
        let piece = [];

        segment.forEach((point) => {
          const dx = point.x - x;
          const dy = point.y - y;
          const shouldErase = dx * dx + dy * dy <= radiusSq;

          if (shouldErase) {
            changed = true;

            if (piece.length >= KHEPRI_MIN_SEGMENT_POINTS) {
              newSegments.push(piece);
              newMeta.push(createSegmentMeta(newSegments.length, true, livingInkMode));
            }

            piece = [];
          } else {
            piece.push(point);
          }
        });

        if (piece.length >= KHEPRI_MIN_SEGMENT_POINTS) {
          newSegments.push(piece);
          newMeta.push(changed ? createSegmentMeta(newSegments.length, true, livingInkMode) : (livingSegmentMeta[segmentIndex] || createSegmentMeta(segmentIndex, false, livingInkMode)));
        }
      });

      if (!changed) return false;

      livingSegments = newSegments;
      livingSegmentMeta = newMeta;
      rebuildLivingStrokeFromSegments();

      if (livingSegments.length === 0) {
        stopLivingStroke();
        clearCanvas();
      }

      return true;
    }

    function eraseLivingStrokeByKhepriTrail(x, y, directionX, directionY) {
      if (!livingSegments.length) return;

      const size = getKhepriApproxSize();
      const core = Math.min(size.width, size.height);
      const offset = core * KHEPRI_ERASER_BACK_OFFSET_RATIO;
      const radius = Math.max(12, core * KHEPRI_ERASER_RADIUS_RATIO);
      const eraseX = x - directionX * offset;
      const eraseY = y - directionY * offset;

      if (khepriLastEraseX !== null) {
        const dx = eraseX - khepriLastEraseX;
        const dy = eraseY - khepriLastEraseY;
        const moved = Math.sqrt(dx * dx + dy * dy);

        if (moved < KHEPRI_ERASER_MIN_MOVE) return;
      }

      khepriLastEraseX = eraseX;
      khepriLastEraseY = eraseY;
      eraseLivingStrokeAt(eraseX, eraseY, radius);
    }

    pressButton.addEventListener("pointerdown", (event) => {
      event.stopPropagation();
    });

    pressButton.addEventListener("mousedown", (event) => {
      event.stopPropagation();
    });

    pressButton.addEventListener("click", (event) => {
      event.stopPropagation();

      isPressed = !isPressed;
      updatePenImage();

      if (!step1Done) {
        step1Done = true;
        updateGuide();
      }
    });

    function handleBodyPickUp(event) {
      if (event.cancelable) {
        event.preventDefault();
      }
      event.stopPropagation();

      if (isSelected) return;

      if (event.pointerId !== undefined && event.currentTarget && event.currentTarget.releasePointerCapture) {
        requestAnimationFrame(() => {
          try {
            event.currentTarget.releasePointerCapture(event.pointerId);
          } catch (error) {}
        });
      }

      pickUpPen(event.clientX, event.clientY, true);

      if (!step2Done && step1Done) {
        step2Done = true;
        updateGuide();
      }
    }

    bodyButton.addEventListener("pointerdown", handleBodyPickUp);

    /*
      Chrome 会在 pointerdown 后额外触发 mousedown / click。
      这些只负责拦截，不能再次改变笔的状态，否则笔会突然不像鼠标。
    */
    bodyButton.addEventListener("mousedown", (event) => {
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    });

    bodyButton.addEventListener("click", (event) => {
      if (event.cancelable) event.preventDefault();
      event.stopPropagation();
    });

    function beginDrawPointer(event) {
      if (window.innerWidth <= 700 && home.classList.contains("about-open")) {
        return;
      }

      if (!isSelected) {
        if (!languageSwitch.contains(event.target) && !colorSwitch.contains(event.target)) {
          languageSwitch.classList.remove("is-open");
        }
        return;
      }

      if (event.cancelable) {
        event.preventDefault();
      }

      pointerDownX = event.clientX;
      pointerDownY = event.clientY;
      hasMoved = false;

      movePenTipTo(event.clientX, event.clientY);

      if (!isPressed) {
        isDrawing = false;
        lastPoint = null;
        currentStroke = [];
        return;
      }

      isDrawing = true;

      lastPoint = getPenTipPoint();
      currentStroke = [lastPoint];
    }

    function handlePointerMove(event) {
      if (!isSelected) return;

      lastMouseX = event.clientX;
      lastMouseY = event.clientY;

      /* 核心：笔被拿起之后，鼠标到哪里，笔尖就到哪里。 */
      movePenTipTo(event.clientX, event.clientY);

      const distanceX = event.clientX - pointerDownX;
      const distanceY = event.clientY - pointerDownY;
      const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

      if (distance > moveThreshold) {
        hasMoved = true;
      }

      if (isDrawing && isPressed) {
        const currentPoint = getPenTipPoint();

        if (lastPoint) {
          drawLine(lastPoint, currentPoint);
        }

        currentStroke.push(currentPoint);
        lastPoint = currentPoint;
      }
    }

    function finishDrawPointer(event) {
      if (!isSelected) return;

      const now = performance.now();

      /* 拿起笔那一下的 mouseup / pointerup 只说明用户松开了笔身，不应该把笔放回去。 */
      if (ignoreNextPointerUp || now <= ignoreUpUntil || now - lastPenPickupTime < 520) {
        ignoreNextPointerUp = false;
        hasMoved = false;
        return;
      }

      if (!hasMoved) {
        putDownPen();
        return;
      }

      if (isDrawing && isPressed && currentStroke.length > 2) {
        const strokeToAnimate = currentStroke.slice();

        const shouldCompleteGuide = !step3Done && step2Done;

        if (shouldCompleteGuide) {
          step3Done = true;
        }

        putDownPen();

        if (shouldCompleteGuide) {
          updateGuide();
        }

        setTimeout(() => {
          startLivingStroke(strokeToAnimate);
        }, 160);

        return;
      }

      putDownPen();
    }

    function handleKhepriPointerMove(event) {
      if (!isKhepriCrawlerLayout()) return;
      if (event.target && khepriUi.contains(event.target)) return;

      scheduleKhepriTargetFromPointer(event.clientX, event.clientY);
    }

    if (supportsPointerEvents) {
      window.addEventListener("pointermove", handleKhepriPointerMove, { passive: true });
      window.addEventListener("pointerdown", beginDrawPointer, true);
      document.addEventListener("pointermove", handlePointerMove, true);
      window.addEventListener("pointerup", finishDrawPointer, true);
    } else {
      window.addEventListener("mousemove", handleKhepriPointerMove, false);
      window.addEventListener("mousedown", beginDrawPointer, true);
      document.addEventListener("mousemove", handlePointerMove, true);
      window.addEventListener("mouseup", finishDrawPointer, true);
    }

    window.addEventListener("pointercancel", () => {
      putDownPen();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        resetGuideToStart();
      }
    });
  </script>
</body>
</html>
